<html>
<head>

  <script>
    // ================================================================
    // SANKADIOKRO — Assistante Vocale Africaine Francophone v2
    // Sélection de voix féminine africaine/française + paramètres
    // ================================================================

    window._ttsVoice       = null;
    window._ttsReady       = false;
    window._ttsSpeaking    = false;
    window._ttsRate        = 0.88;   // vitesse par défaut
    window._ttsPitch       = 1.22;   // ton féminin par défaut
    window._ttsVolume      = 1.0;
    window._ttsVoiceName   = '';     // '' = auto
    window._ttsAfricanAvail = false; // voix africaine native disponible?

    // ── Codes locales africains francophones ──────────────────────
    var AFRICAN_FR_LOCALES = [
      'fr-CI','fr-SN','fr-CM','fr-MG','fr-BF',
      'fr-ML','fr-GN','fr-TG','fr-BJ','fr-CD','fr-CG',
    ];

    // ── Mots-clés noms féminins connus (multi-OS) ─────────────────
    var FEMALE_KEYWORDS = [
      'amélie','amelie','marie','claire','juliette','manon',
      'céline','celine','audrey','virginie','léonie','leonie',
      'google français','google french',
      'fr-fr-wavenet-a','fr-fr-wavenet-c',
      'fr-fr-neural2-a','fr-fr-neural2-c',
      'fr-fr-x-fra-x-low','fr-fr-x-fra',
      'female','femme',
    ];

    // ── Sélection automatique de la meilleure voix ────────────────
    function selectBestVoice(voices, preferredName) {
      if (!voices || voices.length === 0) return null;

      // 0. Voix choisie manuellement par l'utilisateur
      if (preferredName && preferredName !== '') {
        var found = null;
        for (var i = 0; i < voices.length; i++) {
          if (voices[i].name === preferredName) { found = voices[i]; break; }
        }
        if (found) {
          console.log('[TTS] Voix choisie par utilisateur:', found.name);
          return found;
        }
      }

      // 1. Voix africaine francophone
      for (var a = 0; a < AFRICAN_FR_LOCALES.length; a++) {
        for (var j = 0; j < voices.length; j++) {
          if (voices[j].lang &&
              voices[j].lang.toLowerCase() === AFRICAN_FR_LOCALES[a].toLowerCase()) {
            window._ttsAfricanAvail = true;
            console.log('[TTS] Voix africaine trouvée:', voices[j].name, voices[j].lang);
            return voices[j];
          }
        }
      }

      // 2. Voix féminine française connue (nom ou wavenet)
      var frVoices = voices.filter(function(v) {
        return v.lang && v.lang.toLowerCase().startsWith('fr');
      });
      for (var k = 0; k < frVoices.length; k++) {
        var lname = frVoices[k].name.toLowerCase();
        for (var m = 0; m < FEMALE_KEYWORDS.length; m++) {
          if (lname.indexOf(FEMALE_KEYWORDS[m]) !== -1) {
            console.log('[TTS] Voix féminine française:', frVoices[k].name);
            return frVoices[k];
          }
        }
      }

      // 3. Première voix fr-FR disponible
      var frFR = frVoices.filter(function(v) {
        return v.lang && v.lang.toLowerCase() === 'fr-fr';
      });
      if (frFR.length > 0) {
        console.log('[TTS] Fallback fr-FR:', frFR[0].name);
        return frFR[0];
      }

      // 4. N'importe quelle voix française
      if (frVoices.length > 0) {
        console.log('[TTS] Fallback fr:', frVoices[0].name);
        return frVoices[0];
      }

      console.log('[TTS] Aucune voix française trouvée');
      return null;
    }

    function initTTSVoice() {
      if (!window.speechSynthesis) return;
      var voices = window.speechSynthesis.getVoices();
      if (voices.length > 0) {
        window._ttsVoice = selectBestVoice(voices, window._ttsVoiceName);
        window._ttsReady = true;
        console.log('[TTS] Voix initialisée:', window._ttsVoice ? window._ttsVoice.name : 'défaut');
      }
    }

    if (window.speechSynthesis) {
      window.speechSynthesis.addEventListener('voiceschanged', function() {
        initTTSVoice();
      });
      setTimeout(initTTSVoice, 300);
      setTimeout(initTTSVoice, 1000);
      setTimeout(initTTSVoice, 3000);
    }

    // ── Fonction principale appelée depuis Flutter/Dart ───────────
    window.africanSpeak = function(text, rate, pitch, volume) {
      if (!window.speechSynthesis) return;
      window.speechSynthesis.cancel();
      if (!text || text.trim() === '') return;

      var utt = new SpeechSynthesisUtterance(text);
      utt.lang   = 'fr-FR';
      utt.rate   = rate   || window._ttsRate   || 0.88;
      utt.pitch  = pitch  || window._ttsPitch  || 1.22;
      utt.volume = volume || window._ttsVolume || 1.0;

      if (!window._ttsReady) initTTSVoice();
      if (window._ttsVoice) {
        utt.voice = window._ttsVoice;
        utt.lang  = window._ttsVoice.lang;
      }

      utt.onstart = function() { window._ttsSpeaking = true; };
      utt.onend   = function() { window._ttsSpeaking = false; };
      utt.onerror = function(e) {
        window._ttsSpeaking = false;
        if (e.error !== 'canceled' && e.error !== 'interrupted') {
          var r = new SpeechSynthesisUtterance(text);
          r.lang = 'fr-FR'; r.rate = utt.rate; r.pitch = utt.pitch; r.volume = utt.volume;
          window.speechSynthesis.speak(r);
        }
      };
      window.speechSynthesis.speak(utt);
    };

    // ── Arrêt ─────────────────────────────────────────────────────
    window.africanStop = function() {
      if (window.speechSynthesis) {
        window.speechSynthesis.cancel();
        window._ttsSpeaking = false;
      }
    };

    window.africanIsSpeaking = function() {
      return window.speechSynthesis ? window.speechSynthesis.speaking : false;
    };

    // ── API de configuration appelée depuis Flutter ───────────────
    // Retourne la liste JSON des voix françaises disponibles
    window.getTTSVoiceList = function() {
      if (!window.speechSynthesis) return '[]';
      var voices = window.speechSynthesis.getVoices();
      var fr = voices.filter(function(v) {
        return v.lang && v.lang.toLowerCase().startsWith('fr');
      });
      var result = fr.map(function(v) {
        return JSON.stringify({ name: v.name, lang: v.lang, local: v.localService });
      });
      return '[' + result.join(',') + ']';
    };

    // Applique les paramètres de voix depuis Flutter
    window.setTTSConfig = function(voiceName, rate, pitch, volume) {
      window._ttsVoiceName = voiceName || '';
      window._ttsRate      = rate   || 0.88;
      window._ttsPitch     = pitch  || 1.22;
      window._ttsVolume    = volume || 1.0;
      // Réinitialiser la sélection de voix
      var voices = window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
      if (voices.length > 0) {
        window._ttsVoice = selectBestVoice(voices, window._ttsVoiceName);
        window._ttsReady = true;
        console.log('[TTS] Config appliquée — voix:', window._ttsVoice ? window._ttsVoice.name : 'défaut',
                    '| rate:', window._ttsRate, '| pitch:', window._ttsPitch);
      }
    };

    // Indique si une voix africaine native est disponible
    window.isTTSAfricanAvailable = function() {
      return window._ttsAfricanAvail;
    };

    // Liste debug
    window.listTTSVoices = function() {
      var voices = window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
      var fr = voices.filter(function(v) { return v.lang && v.lang.startsWith('fr'); });
      fr.forEach(function(v) { console.log(' -', v.name, '|', v.lang); });
      return fr.map(function(v) { return v.name + ' (' + v.lang + ')'; });
    };

    console.log('[SANKADIOKRO] Assistante vocale africaine v2 initialisée');
  </script>

  <!-- ================================================================
       DÉSACTIVATION TOTALE DU SERVICE WORKER + PURGE DU CACHE
       Exécuté AVANT flutter_bootstrap.js pour forcer le rechargement
       du vrai main.dart.js depuis le réseau (pas depuis le cache SW)
       ================================================================ -->
  <script>
    (function() {
      'use strict';

      // 1. Dés-enregistrer TOUS les Service Workers actifs
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          var count = registrations.length;
          if (count === 0) {
            console.log('[SW] Aucun service worker enregistré');
            return;
          }
          registrations.forEach(function(registration) {
            registration.unregister().then(function(success) {
              if (success) {
                console.log('[SW] Service worker désenregistré:', registration.scope);
              }
            });
          });
          console.log('[SW] ' + count + ' service worker(s) supprimé(s)');
        }).catch(function(err) {
          console.warn('[SW] Erreur lors de la suppression:', err);
        });
      }

      // 2. Vider TOUS les caches du navigateur (Cache Storage API)
      if ('caches' in window) {
        caches.keys().then(function(cacheNames) {
          if (cacheNames.length === 0) {
            console.log('[CACHE] Aucun cache à purger');
            return;
          }
          cacheNames.forEach(function(cacheName) {
            caches.delete(cacheName).then(function(deleted) {
              if (deleted) {
                console.log('[CACHE] Cache supprimé:', cacheName);
              }
            });
          });
          console.log('[CACHE] ' + cacheNames.length + ' cache(s) purgé(s)');
        }).catch(function(err) {
          console.warn('[CACHE] Erreur lors de la purge:', err);
        });
      }

      // 3. Supprimer les clés Hive / SharedPreferences / données locales
      //    depuis localStorage et sessionStorage
      try {
        var keysToRemove = [];
        for (var i = 0; i < localStorage.length; i++) {
          var key = localStorage.key(i);
          if (key && (
            key.startsWith('hive_') ||
            key.startsWith('flutter.') ||
            key.startsWith('sankadio') ||
            key.startsWith('app_') ||
            key === 'flutter_shared_preferences'
          )) {
            keysToRemove.push(key);
          }
        }
        keysToRemove.forEach(function(k) {
          localStorage.removeItem(k);
          console.log('[STORAGE] Clé supprimée:', k);
        });
      } catch (e) {
        console.warn('[STORAGE] Erreur localStorage:', e);
      }

      // 4. Supprimer toutes les bases IndexedDB liées à Hive / l'application
      if ('indexedDB' in window) {
        var dbsToDelete = [
          'hive_flutter',
          'hive',
          'sankadio',
          'FlutterSharedPreferences'
        ];
        dbsToDelete.forEach(function(dbName) {
          try {
            var req = indexedDB.deleteDatabase(dbName);
            req.onsuccess = function() {
              console.log('[IDB] Base supprimée:', dbName);
            };
            req.onerror = function() {
              // Silencieux si la base n'existe pas
            };
          } catch(e) { /* ignoré */ }
        });

        // Lister et supprimer TOUTES les bases IndexedDB présentes
        if (indexedDB.databases) {
          indexedDB.databases().then(function(dbs) {
            dbs.forEach(function(db) {
              if (db.name && (
                db.name.toLowerCase().includes('hive') ||
                db.name.toLowerCase().includes('flutter') ||
                db.name.toLowerCase().includes('sankadio')
              )) {
                indexedDB.deleteDatabase(db.name);
                console.log('[IDB] Base dynamique supprimée:', db.name);
              }
            });
          }).catch(function() { /* API non supportée */ });
        }
      }

      console.log('[SANKADIOKRO] Cache & SW purge terminée — chargement réseau forcé');
    })();
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>

    })();
  </script>
