# netlify.toml — Configuration Netlify pour SANKADIOKRO Flutter Web
# Ce fichier garantit que Netlify publie uniquement build/web
# et gère les redirections SPA Flutter

[build]
  # Répertoire de publication — Netlify doit pointer ici
  publish = "build/web"
  # Commande de build vide : le build Flutter est fait manuellement
  command = ""

# ── Redirections SPA Flutter Web ──
# Toutes les routes inconnues → index.html avec code 200 (pas 301/302)
# Nécessaire pour que Flutter Web gère lui-même la navigation
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

# ── Headers de sécurité ──
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# ── Cache pour les assets Flutter (immutables) ──
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/flutter_service_worker.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
