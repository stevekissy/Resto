# netlify.toml — Configuration Netlify pour SANKADIOKRO Flutter Web
# Ce fichier garantit que Netlify publie uniquement build/web
# et gère les redirections SPA Flutter

[build]
  # Répertoire de publication — Netlify doit pointer ici
  publish = "build/web"
  # Commande de build vide : le build Flutter est fait manuellement
  command = ""

# ── Redirections SPA Flutter Web ──
# Toutes les routes inconnues → index.html avec code 200 (pas 301/302)
# Nécessaire pour que Flutter Web gère lui-même la navigation
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

# ── Headers de sécurité globaux ──
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# ── CRITIQUE : main.dart.js et flutter_bootstrap.js — JAMAIS en cache ──
# Ces fichiers contiennent tout le code de l'app et doivent être rechargés
[[headers]]
  for = "/main.dart.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

[[headers]]
  for = "/flutter_bootstrap.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

# ── flutter_service_worker.js — JAMAIS en cache ──
[[headers]]
  for = "/flutter_service_worker.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

# ── index.html — JAMAIS en cache ──
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

# ── Assets statiques Flutter (images, fonts, shaders) — cache long ──
# Ces fichiers ont des noms fixes, on les cache longtemps
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# ── CanvasKit WASM/JS — cache modéré (rarement changé) ──
[[headers]]
  for = "/canvaskit/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"
